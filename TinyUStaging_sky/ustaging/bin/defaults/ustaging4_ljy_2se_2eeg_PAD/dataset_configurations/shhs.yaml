train_data:
  data_dir: ../datasets/processed/shhs/views/fixed_split/train
  period_length_sec: 30
  identifier: "TRAIN"
  psg_regex: .*[.]h5
  hyp_regex: .*[.]ids

val_data:
  data_dir: ../datasets/processed/shhs/views/fixed_split/val
  period_length_sec: 30
  identifier: "VAL"
  psg_regex: .*[.]h5
  hyp_regex: .*[.]ids

test_data:
  data_dir: ../datasets/processed/shhs/views/fixed_split/test
  period_length_sec: 30
  identifier: "TEST"
  psg_regex: .*[.]h5
  hyp_regex: .*[.]ids

set_sample_rate: 128

#select_channels: [
#'C4-A1', 'C3-A2'
#]

load_time_channel_sampling_groups: [
  # [C4-A1],  # 检查 preproc.log -- “Setting load-time random channel selector” group_1不可为空！
  # [C3-A2]
  [ C4-A1, C3-A2 ],  # 检查 preproc.log -- “Setting load-time random channel selector” group_1不可为空！
  [ EOG(L)-PG1, EOG(R)-PG1 ] # 写C3-A2会报错！？
]

sleep_stage_annotations:
#  W: 0
#  N1: 2
#  N2: 3
#  N3: 4
#  REM: 1
#  UNKNOWN: 5
  W: 0
  N1: 2
  N2: 2
  N3: 3
  REM: 1
  UNKNOWN: 4


strip_func:
  strip_func: strip_to_match

quality_control_func:
  quality_control_func: "clip_noisy_values"
  min_max_times_global_iqr: 20
  
scaler: "RobustScaler"
batch_wise_scaling: false
