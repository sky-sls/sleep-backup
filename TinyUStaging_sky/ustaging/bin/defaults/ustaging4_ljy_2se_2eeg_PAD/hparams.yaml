__CB_timer: &TIMER
  # Train timer callback
  nickname: "timer"
  class_name: "TrainTimer"
  pass_logger: True
  kwargs: {verbose: True}

__CB_csv: &CSV
  # keras.CSVLogger
  nickname: "csv"
  class_name: "CSVLogger"
  kwargs: {filename: "logs/training.csv", separator: ",", append: true}

datasets: # preprocessed对应999_2SE [preproc:2eeg上下不可重复，train时可将yaml设为重复]
  sedf_st: dataset_configurations/sedf_st.yaml
  sedf_sc: dataset_configurations/sedf_sc.yaml
  dcsm: dataset_configurations/dcsm.yaml
  phys: dataset_configurations/phys.yaml
  shhs: dataset_configurations/shhs.yaml
  #### Testing datasets
  #dod_o: dataset_configurations/dod_o.yaml
  #dod_h: dataset_configurations/dod_h.yaml


build:
  #
  # Hyperparameters passed to the Model.build and __init__ methods
  #
  model_class_name: "UStaging4"
#  attention_module_encoder: "CBAM"
#  attention_module_encoder_layer: 1  # FM=(None, 11904, 1, 22)
#  isChanAttn: False   # 若CBAM在较浅层，主要关注空间注意力即可, 且bottom有了SE通道注意力，没必要再来一个
  attention_module_bottom: "SE"
  attention_module_dense: "SE"
# attention_module_seq: "CBAM"  # CBAM：2379261
  ratio_se: [1, 8, 4, 1]  # "2SE": 2404763
#  ratio_cbam: 4
  activation: elu
  depth: 4
  pools: [10, 8, 6, 4]
  kernel_size: 5
  dilation: 2   #  # [[1,2], [5,1], [2,5], [1,2]]
  transition_window: 1
  complexity_factor: 2
  n_classes: 4   # 有效分类数=4, W:0,R:1,Light:2,Deep:3  # pad改, 必须与ljy preprocess相一致！
  batch_shape: [16, 31, 3840, 2]  # todo【改7680】: 仅PAD预测需要将3840要改成7680！ 
  # data_per_prediction:  7680  # 30 * 256, 仅PAD预测用！

augmenters:
  #
  # On-the-fly augmentation?
  # Leave empty or delete entirely if not
  #
  [
  {cls_name: "GlobalGaussianNoise",
   kwargs: {sigma: 0.1, apply_prob: 0.2}},
  {cls_name: "RegionalGaussianNoise",
   kwargs: {sigma: 0.2,
            min_region_fraction: 0.001,
            max_region_fraction: 0.50,
            log_sample: True,
            apply_prob: 0.2}},
  {cls_name: "GlobalElasticDeformations",
   kwargs: {alpha: [0, 35],
            sigma: [3, 30],
            apply_prob: 0.2}},
  {cls_name: "RegionalErase",
   kwargs: {min_region_fraction: 0.001,
            max_region_fraction: 0.3,
            log_sample: True,
            apply_prob: 0.2}},
   {cls_name: "ChannelDropout", # 新加
    kwargs: {drop_fraction: 0.1,
             apply_prob: 0.1}}
  ]

fit:
  #
  # Hyperparameters passed to the Trainer object
  #
  balanced_sampling: True
  use_multiprocessing: False
  channel_mixture: False
  margin: 15

  # Loss function -> mpunet/evaluate/loss_functions.py ❤
  loss: ["SparseFocalDiceWLoss_ljy"]  # SparseCategoricalCrossentropy/SparseFocalSCCELoss_ljy/'SparseDiceLoss'/'SparseGeneralizedDiceLoss', 'SparseJaccardDistanceLoss'(smooth=1),
  metrics: ["sparse_categorical_accuracy"]

  # Pass parameters to the loss function here, e.g. class weights
  # Note: class weights only supported by some loss functions!
  # Leave empty or remove field if loss takes no parameters
  loss_kwargs: {
    class_weights: [0.25, 0.26, 0.26, 0.25]  # 'SparseFocalLoss', W, R, Light, Deep
#       type_weight: 'simple'
  }

  # Ignore class in loss computation (e.g. to ignore 'UNKNOWN'/'MOVEMENT' other rare classes)
  # Comment out or set to Null to not ignore any classes
  ignore_class_int: 4  # pad改, 必须与ljy preprocess、train相一致！

  # Optimization
  batch_size: 16
  n_epochs: 2000
  verbose: true
  optimizer: "Adam"
  optimizer_kwargs: {lr: 5.0e-06, decay: 0.0, beta_1: 0.9, beta_2: 0.999, epsilon: 1.0e-8}
#  optimizer_kwargs: {lr: 1.0e-07, amsgrad: True, decay: 0.0, beta_1: 0.9, beta_2: 0.999, epsilon: 1.0e-8}
                    #lr: 5.0e-06, amsgrad: 删, # LJY改
  # Callbacks
  callbacks: [*TB, *MCP_CLEAN, *TIMER, *CSV, *ES, *REDUCE_LR]

# 配置hparams.yaml，在最后填写：
# predict_one
prediction_params:
    channels: "EEG1++EEG2"
    period_length_sec: 30  # 采样时间必须大于30s！！
    strip_func:
        strip_func_str: strip_to_match

    set_sample_rate: 256

    scaler:  "RobustScaler"

    quality_control_func:
      quality_control_func: "clip_noisy_values" 
      min_max_times_global_iqr: 20

__VERSION__: Null
__BRANCH__: Null
__COMMIT__: Null
